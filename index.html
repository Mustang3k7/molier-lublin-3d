<!--
Nazwa: Strona z wykresem Moliera 3D z płaszczyznami RH
Cel:
- Wyświetlanie uproszczonego wykresu Moliera w 3D.
- Zamiana dawnych linii RH na powierzchnie rozciągnięte w osi czasu.
- Pokazanie rzeczywistej trajektorii punktu meteo dla Lublina.
- Ustawienie wizualnej szerokości osi entalpii w bardziej zrównoważony sposób względem pozostałych osi.
Użycie:
- Wklej plik jako index.html albo uruchom w podglądzie kanwy.
Uruchomienie:
- Lokalnie: otwarcie pliku index.html w przeglądarce.
- GitHub Pages: po wrzuceniu pliku do repozytorium.
Wymagania:
- Przeglądarka z obsługą JavaScript
- Dostęp do Internetu
- Dostęp do CDN Plotly i API Open-Meteo
Wynik:
- Jedna strona zawierająca tylko wykres Moliera 3D
- Oś X: temperatura sucha
- Oś Y: czas
- Oś Z: entalpia
- Powierzchnie odpowiadające poziomom RH
- Trajektoria rzeczywistych danych pogodowych
- Wyróżniony aktualny punkt
Zatrzymanie:
- Zamknięcie strony lub odświeżenia przeglądarki
Uwagi:
- Wykres jest uproszczony i poglądowy.
- Obliczenia psychrometryczne są przybliżone.
- Powierzchnie RH są stałe w czasie i są rozciągnięte po osi czasu dla czytelności przestrzennej.
Data: 2026-04-08
Status: narzędzie

Założenia i interpretacja działania:
- Strona ma zawierać wyłącznie jeden wykres.
- Dawne linie RH mają zostać zamienione na powierzchnie w 3D.
- Temperatura sucha ma być osią X, a sama oś ma mieć kierunek od 10 do -40 bez odwracania danych wejściowych.
- Czas ma być osią Y.
- Entalpia ma być osią Z.
- Powierzchnie RH są budowane przez przeciągnięcie charakterystyki psychrometrycznej po osi czasu.
- Trajektoria rzeczywistych danych jest rysowana na tle tych powierzchni.
- Oś entalpii ma być wizualnie zwężona tylko umiarkowanie, tak aby wykres pozostał czytelny i nie ucinał użytecznego zakresu.
-->

<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wykres Moliera 3D</title>

  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

  <style>
    :root {
      --bg: #0b1220;
      --panel: #0f172a;
      --border: #243146;
      --text: #e5edf8;
      --muted: #9fb0c8;
      --accent: #f472b6;
      --accent2: #4f8cff;
      --shadow: rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .card {
      width: 100vw;
      height: 100vh;
      max-width: none;
      margin: 0;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.95), rgba(11, 18, 32, 0.98));
      border: 1px solid var(--border);
      border-radius: 0;
      box-shadow: 0 12px 28px var(--shadow);
      padding: 8px 10px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      grid-auto-rows: min-content;
      gap: 4px;
      overflow: hidden;
    }

    .head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 0;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
    }

    .subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    #mollier3dChart {
      width: 100%;
      height: 100%;
      min-height: 0;
      min-width: 0;
    }

    .info {
      margin-top: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .control-panel {
      display: grid;
      grid-auto-rows: min-content;
      gap: 6px;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      padding: 0 6px;
      min-height: 28px;
      flex-wrap: wrap;
    }

    .control-row label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .control-row input[type="range"] {
      flex: 1 1 auto;
      min-width: 180px;
    }

    .control-row button {
      height: 32px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #0f172a;
      color: var(--text);
      cursor: pointer;
    }

    .control-row input[type="datetime-local"] {
      width: 220px;
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <section class="card">
    <div class="head">
      <div>
        <div class="title">Wykres Moliera 3D</div>
        <div class="subtitle">X = temperatura sucha, Y = czas, Z = entalpia</div>
      </div>
      <div id="status" class="status">Start...</div>
    </div>

    <div class="control-panel">
      <div class="control-row">
        <label for="historyHoursRange">Segment danych: <span id="historyHoursLabel">72 h (3.00 dni)</span></label>
        <input id="historyHoursRange" type="range" min="1" max="168" step="1" value="72" />
      </div>
      <div class="control-row">
        <label for="startDateInput">Start:</label>
        <input id="startDateInput" type="datetime-local" />
        <label for="endDateInput">Koniec:</label>
        <input id="endDateInput" type="datetime-local" />
        <button id="fetchRangeButton" type="button">Pobierz</button>
      </div>
    </div>

    <div id="mollier3dChart"></div>

    <div id="info" class="info">
      Oczekiwanie na dane...
    </div>
  </section>

  <script>
    // =============================================================================
    // REFERENCJE DO ELEMENTÓW
    // =============================================================================
    const statusEl = document.getElementById("status");
    const infoEl = document.getElementById("info");

    // =============================================================================
    // STAŁE
    // =============================================================================
    const DEFAULT_HISTORY_HOURS = 72;
    const RH_SURFACES = [20, 40, 60, 80, 100];
    const DEFAULT_TEMP_AXIS_MIN = -40;
    const DEFAULT_TEMP_AXIS_MAX = 10;
    const AXIS_DATA_COVERAGE_TARGET = 0.8;

    let historyHours = DEFAULT_HISTORY_HOURS;
    let cachedHistory = [];
    let cachedCurrentPoint = null;
    let cachedRange = null;
    let selectedRangeDirty = false;
    const historyHoursRangeEl = document.getElementById("historyHoursRange");
    const historyHoursLabelEl = document.getElementById("historyHoursLabel");
    const startDateInputEl = document.getElementById("startDateInput");
    const endDateInputEl = document.getElementById("endDateInput");
    const fetchRangeButtonEl = document.getElementById("fetchRangeButton");

    function formatDays(hours) {
      return (hours / 24).toFixed(2);
    }

    function updateHistoryHoursLabel(hours) {
      historyHoursLabelEl.textContent = `${hours} h (${formatDays(hours)} dni)`;
    }

    function padNumber(value) {
      return String(value).padStart(2, "0");
    }

    function formatDateTimeLocal(date) {
      const local = new Date(date);
      const year = local.getFullYear();
      const month = padNumber(local.getMonth() + 1);
      const day = padNumber(local.getDate());
      const hours = padNumber(local.getHours());
      const minutes = padNumber(local.getMinutes());
      return `${year}-${month}-${day}T${hours}:${minutes}`;
    }

    function getSelectedDateRange() {
      const start = startDateInputEl.valueAsDate;
      const end = endDateInputEl.valueAsDate;
      if (!(start instanceof Date) || !(end instanceof Date) || Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) {
        return null;
      }
      return start < end ? { start, end } : null;
    }

    function updateDateRangeInputs(end = new Date(), hoursBack = historyHours) {
      const endDate = new Date(end);
      const startDate = new Date(endDate.getTime() - hoursBack * 60 * 60 * 1000);
      startDateInputEl.value = formatDateTimeLocal(startDate);
      endDateInputEl.value = formatDateTimeLocal(endDate);
    }

    function rangesEqual(a, b) {
      return Boolean(a && b && a.start.getTime() === b.start.getTime() && a.end.getTime() === b.end.getTime());
    }

    function updateSliderRangeForSelectedDates() {
      const range = getSelectedDateRange();
      if (!range) {
        historyHoursRangeEl.min = 1;
        historyHoursRangeEl.max = 168;
        historyHours = Math.min(historyHours, 168);
        historyHoursRangeEl.value = String(historyHours);
        updateHistoryHoursLabel(historyHours);
        selectedRangeDirty = Boolean(cachedRange);
        return;
      }

      const totalHours = Math.max(Math.round((range.end.getTime() - range.start.getTime()) / (60 * 60 * 1000)), 1);
      historyHoursRangeEl.min = 1;
      historyHoursRangeEl.max = String(totalHours);
      if (historyHours > totalHours) {
        historyHours = totalHours;
        historyHoursRangeEl.value = String(historyHours);
      }
      updateHistoryHoursLabel(historyHours);

      selectedRangeDirty = !rangesEqual(range, cachedRange);
    }

    function getCachedPlotHistory() {
      if (!cachedHistory.length) {
        return [];
      }

      const requestedHours = Number(historyHoursRangeEl.value);
      const latestTime = cachedHistory[cachedHistory.length - 1].time;
      const minTime = new Date(latestTime.getTime() - requestedHours * 60 * 60 * 1000);

      return cachedHistory.filter(point => point.time >= minTime);
    }

    async function loadRangeHistory() {
      const range = getSelectedDateRange();
      if (!range) {
        throw new Error("Nieprawidłowy zakres dat. Upewnij się, że wybrano poprawny start i koniec.");
      }
      if (range.start >= range.end) {
        throw new Error("Start musi być wcześniej niż koniec.");
      }

      const history = await fetchLublinHistoryRange(range.start, range.end);
      cachedHistory = history;
      cachedRange = range;
      return history;
    }

    async function renderFromCache() {
      if (!cachedHistory.length || selectedRangeDirty) {
        return;
      }

      const historySubset = getCachedPlotHistory();
      renderMollier3D(historySubset, cachedCurrentPoint);
      const totalHours = Math.round((cachedHistory[cachedHistory.length - 1].time.getTime() - cachedHistory[0].time.getTime()) / (60 * 60 * 1000));
      const shownHours = Math.min(Number(historyHoursRangeEl.value), totalHours);
      const rangeLabel = cachedRange
        ? `${formatDateTime(cachedRange.start)} — ${formatDateTime(cachedRange.end)}`
        : `ostatnie ${totalHours} h`;

      infoEl.textContent =
        `Wyświetlone: ostatnie ${shownHours} h z zakresu ${rangeLabel}`;
    }

    async function loadAndRenderSelectedRange() {
      const history = await loadRangeHistory();
      const current = await fetchLublinCurrent();
      const currentHumidityRatio = calculateHumidityRatio(current.temp, current.rh, current.pressure);
      const currentEnthalpy = calculateEnthalpy(current.temp, currentHumidityRatio);
      const currentPoint = (
        Number.isFinite(current.temp) &&
        Number.isFinite(currentEnthalpy) &&
        current.time instanceof Date
      )
        ? {
            time: current.time,
            enthalpy: currentEnthalpy,
            temp: current.temp
          }
        : null;

      cachedCurrentPoint = currentPoint;
      selectedRangeDirty = false;
      renderFromCache();
      statusEl.textContent = `OK | pobranych punktów: ${history.length}`;
    }

    // =============================================================================
    // FUNKCJE POMOCNICZE
    // =============================================================================
    function formatDateTime(dateOrString) {
      const date = dateOrString instanceof Date ? dateOrString : new Date(dateOrString);
      return date.toLocaleString("pl-PL");
    }

    function formatDateApi(date) {
      const y = date.getUTCFullYear();
      const m = String(date.getUTCMonth() + 1).padStart(2, "0");
      const d = String(date.getUTCDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function calculateHumidityRatio(tempC, rhPercent, pressureHpa = 1013.25) {
      if (!Number.isFinite(tempC) || !Number.isFinite(rhPercent) || !Number.isFinite(pressureHpa)) {
        return null;
      }

      const pws = 6.112 * Math.exp((17.67 * tempC) / (tempC + 243.5));
      const pw = (rhPercent / 100.0) * pws;
      return 0.62198 * pw / (pressureHpa - pw);
    }

    function calculateEnthalpy(tempC, humidityRatioKgKg) {
      if (!Number.isFinite(tempC) || !Number.isFinite(humidityRatioKgKg)) {
        return null;
      }

      return 1.006 * tempC + humidityRatioKgKg * (2501 + 1.86 * tempC);
    }

    function calculateDewPoint(tempC, rhPercent) {
      if (!Number.isFinite(tempC) || !Number.isFinite(rhPercent) || rhPercent <= 0) {
        return null;
      }

      const a = 17.27;
      const b = 237.7;
      const gamma = ((a * tempC) / (b + tempC)) + Math.log(rhPercent / 100.0);
      return (b * gamma) / (a - gamma);
    }

    function calculateAbsoluteHumidity(tempC, rhPercent) {
      if (!Number.isFinite(tempC) || !Number.isFinite(rhPercent)) {
        return null;
      }

      const saturationVaporPressure = 6.112 * Math.exp((17.67 * tempC) / (tempC + 243.5));
      const vaporPressure = (rhPercent / 100.0) * saturationVaporPressure;
      return 216.7 * (vaporPressure / (tempC + 273.15));
    }

    // =============================================================================
    // OPEN-METEO
    // =============================================================================
    let lublinGeo = null;

    async function getLublinGeo() {
      if (lublinGeo) {
        return lublinGeo;
      }

      const url = "https://geocoding-api.open-meteo.com/v1/search?name=Lublin&count=1&language=pl&format=json";
      const response = await fetch(url);
      const data = await response.json();

      if (!data.results || !data.results.length) {
        throw new Error("Nie znaleziono Lublina.");
      }

      lublinGeo = {
        latitude: data.results[0].latitude,
        longitude: data.results[0].longitude
      };

      return lublinGeo;
    }

    async function fetchLublinCurrent() {
      const geo = await getLublinGeo();

      const url =
        `https://api.open-meteo.com/v1/forecast?latitude=${geo.latitude}&longitude=${geo.longitude}&current=temperature_2m,relative_humidity_2m,pressure_msl&timezone=GMT`;

      const response = await fetch(url);
      const data = await response.json();

      return {
        temp: data?.current?.temperature_2m ?? null,
        rh: data?.current?.relative_humidity_2m ?? null,
        pressure: data?.current?.pressure_msl ?? 1013.25,
        time: data?.current?.time ? new Date(`${data.current.time}Z`) : null
      };
    }

    async function fetchLublinHistory(hoursBack) {
      const geo = await getLublinGeo();

      const now = new Date();
      const start = new Date(now.getTime() - hoursBack * 60 * 60 * 1000);

      return fetchLublinHistoryRange(start, now);
    }

    async function fetchLublinHistoryRange(start, end) {
      const geo = await getLublinGeo();

      const startDateApi = formatDateApi(start);
      const endDateApi = formatDateApi(end);

      const url =
        `https://archive-api.open-meteo.com/v1/archive?latitude=${geo.latitude}&longitude=${geo.longitude}&start_date=${startDateApi}&end_date=${endDateApi}&hourly=temperature_2m,relative_humidity_2m,pressure_msl&timezone=GMT`;

      const response = await fetch(url);
      const data = await response.json();

      const rawTimes = data?.hourly?.time ?? [];
      const rawTemps = data?.hourly?.temperature_2m ?? [];
      const rawRHs = data?.hourly?.relative_humidity_2m ?? [];
      const rawPressures = data?.hourly?.pressure_msl ?? [];

      const out = [];
      const startMs = start.getTime();
      const endMs = end.getTime();

      for (let i = 0; i < rawTimes.length; i++) {
        const time = new Date(`${rawTimes[i]}Z`);
        const ms = time.getTime();

        if (ms < startMs || ms > endMs) {
          continue;
        }

        const temp = rawTemps[i];
        const rh = rawRHs[i];
        const pressure = rawPressures[i];

        const humidityRatio = calculateHumidityRatio(temp, rh, pressure);
        const enthalpy = calculateEnthalpy(temp, humidityRatio);

        if (!Number.isFinite(temp) || !Number.isFinite(enthalpy)) {
          continue;
        }

        out.push({
          time,
          temp,
          rh,
          pressure,
          humidityRatio,
          enthalpy
        });
      }

      return out;
    }

    // =============================================================================
    // BUDOWA POWIERZCHNI RH
    // =============================================================================
    function buildRhSurfaceTrace(rhValue, timeValues, pressureRef) {
      const tempAxis = [];
      for (let t = DEFAULT_TEMP_AXIS_MIN; t <= DEFAULT_TEMP_AXIS_MAX; t += 1) {
        tempAxis.push(t);
      }

      const xMatrix = [];
      const yMatrix = [];
      const zMatrix = [];

      for (let i = 0; i < timeValues.length; i++) {
        const rowX = [];
        const rowY = [];
        const rowZ = [];

        for (let j = 0; j < tempAxis.length; j++) {
          const temp = tempAxis[j];
          const w = calculateHumidityRatio(temp, rhValue, pressureRef);
          const h = calculateEnthalpy(temp, w);

          rowX.push(temp);
          rowY.push(timeValues[i]);
          rowZ.push(Number.isFinite(h) ? h : null);
        }

        xMatrix.push(rowX);
        yMatrix.push(rowY);
        zMatrix.push(rowZ);
      }

      return {
        type: "surface",
        name: `RH ${rhValue}%`,
        x: xMatrix,
        y: yMatrix,
        z: zMatrix,
        customdata: xMatrix,
        opacity: rhValue === 100 ? 0.36 : 0.16,
        showscale: false,
        showlegend: true,
        hovertemplate:
          "Temperatura: %{customdata:.2f} °C<br>" +
          "Czas: %{y}<br>" +
          "Entalpia: %{z:.2f} kJ/kg<extra>RH " + rhValue + "%</extra>",
        contours: {
          x: { show: false },
          y: { show: false },
          z: { show: false }
        },
        colorscale: rhValue === 100
          ? [
              [0, "#f59e0b"],
              [1, "#f59e0b"]
            ]
          : [
              [0, "#2f3f5f"],
              [1, "#2f3f5f"]
            ]
      };
    }

    // =============================================================================
    // WYKRES
    // =============================================================================
    function getCommonPlotConfig() {
      return {
        responsive: true,
        displayModeBar: true,
        scrollZoom: true,
        displaylogo: false
      };
    }


    function renderMollier3D(historyPoints, currentPoint) {
      const traces = [];

      const timeValues = historyPoints.map(p => p.time);
      const pressureValues = historyPoints
        .map(p => p.pressure)
        .filter(v => Number.isFinite(v));

      const pressureRef = pressureValues.length
        ? pressureValues.reduce((a, b) => a + b, 0) / pressureValues.length
        : 1013.25;

      const xAxisVisualScale = 1.45;
      const zAxisVisualScale = 1.1;

      const historyTemps = historyPoints
        .map(p => p.temp)
        .filter(v => Number.isFinite(v));

      const historyEnthalpies = historyPoints
        .map(p => p.enthalpy)
        .filter(v => Number.isFinite(v));

      const tempDataMin = historyTemps.length ? Math.min(...historyTemps) : DEFAULT_TEMP_AXIS_MIN;
      const tempDataMax = historyTemps.length ? Math.max(...historyTemps) : DEFAULT_TEMP_AXIS_MAX;
      const tempDataSpan = Math.max(tempDataMax - tempDataMin, 1);
      const tempSpanTarget = tempDataSpan / AXIS_DATA_COVERAGE_TARGET;
      const currentTemp = currentPoint && Number.isFinite(currentPoint.temp) ? currentPoint.temp : null;
      const tempTargetMin = currentTemp !== null ? Math.min(tempDataMin, currentTemp) : tempDataMin;
      const tempTargetMax = currentTemp !== null ? Math.max(tempDataMax, currentTemp) : tempDataMax;
      const tempMargin = Math.max((tempTargetMax - tempTargetMin) * 0.08, 1);
      const tempSpan = Math.max(tempSpanTarget, tempTargetMax - tempTargetMin + 2 * tempMargin);
      const tempCenter = (tempTargetMin + tempTargetMax) / 2;
      let tempMin = tempCenter - tempSpan / 2;
      let tempMax = tempCenter + tempSpan / 2;

      const enthalpySpanTarget = (tempSpanTarget * zAxisVisualScale) / (xAxisVisualScale * AXIS_DATA_COVERAGE_TARGET);

      const enthalpyDataMin = historyEnthalpies.length ? Math.min(...historyEnthalpies) : 0;
      const enthalpyDataMax = historyEnthalpies.length ? Math.max(...historyEnthalpies) : enthalpySpanTarget;
      const currentEnthalpy = currentPoint && Number.isFinite(currentPoint.enthalpy)
        ? currentPoint.enthalpy
        : null;

      const enthalpyTargetMin = currentEnthalpy !== null ? Math.min(enthalpyDataMin, currentEnthalpy) : enthalpyDataMin;
      const enthalpyTargetMax = currentEnthalpy !== null ? Math.max(enthalpyDataMax, currentEnthalpy) : enthalpyDataMax;
      const enthalpySpan = Math.max(enthalpyTargetMax - enthalpyTargetMin, 1);
      const enthalpyMargin = Math.max(enthalpySpan * 0.15, 1);

      let enthalpyMin = enthalpyTargetMin - enthalpyMargin;
      let enthalpyMax = enthalpyTargetMax + enthalpyMargin;

      if (enthalpyMin < 0) {
        enthalpyMax += -enthalpyMin;
        enthalpyMin = 0;
      }

      const labelTime = timeValues.length ? timeValues[timeValues.length - 1] : new Date();
      const labelTemp = tempMax;

      RH_SURFACES.forEach(rhValue => {
        traces.push(buildRhSurfaceTrace(rhValue, timeValues, pressureRef));
      });

      const surfaceLabels = RH_SURFACES.map(rhValue => {
        const humidityRatio = calculateHumidityRatio(labelTemp, rhValue, pressureRef);
        const enthalpyLabel = calculateEnthalpy(labelTemp, humidityRatio);

        return {
          x: labelTemp,
          y: labelTime,
          z: Number.isFinite(enthalpyLabel) ? enthalpyLabel : enthalpyMax,
          text: `RH ${rhValue}%`,
          showarrow: false,
          xanchor: "left",
          yanchor: "bottom",
          font: { color: "#e5edf8", size: 12 },
          bgcolor: "rgba(15, 23, 42, 0.75)",
          opacity: 0.9
        };
      });

      traces.push({
        type: "scatter3d",
        mode: "lines+markers",
        name: "Przebieg godzinowy",
        x: historyPoints.map(p => p.temp),
        y: historyPoints.map(p => p.time),
        z: historyPoints.map(p => p.enthalpy),
        customdata: historyPoints.map(p => p.temp),
        marker: {
          size: 3.5,
          color: historyPoints.map(p => p.rh),
          colorscale: "Viridis",
          colorbar: {
            title: "RH [%]"
          }
        },
        line: {
          width: 6,
          color: "#4f8cff"
        },
        hovertemplate:
          "Temperatura: %{customdata:.2f} °C<br>" +
          "Czas: %{y}<br>" +
          "Entalpia: %{z:.2f} kJ/kg<extra>Historia</extra>"
      });

      if (currentPoint) {
        traces.push({
          type: "scatter3d",
          mode: "markers+text",
          name: "Aktualny punkt",
          x: [currentPoint.temp],
          y: [currentPoint.time],
          z: [currentPoint.enthalpy],
          customdata: [currentPoint.temp],
          marker: {
            size: 9,
            color: "#f472b6",
            symbol: "diamond"
          },
          text: ["Teraz"],
          textposition: "top center",
          hovertemplate:
            "Temperatura: %{customdata:.2f} °C<br>" +
            "Czas: %{y}<br>" +
            "Entalpia: %{z:.2f} kJ/kg<extra>Aktualny punkt</extra>"
        });
      }

      const layout = {
        margin: { l: 0, r: 0, t: 0, b: 0 },
        paper_bgcolor: "rgba(0,0,0,0)",
        plot_bgcolor: "rgba(0,0,0,0)",
        font: { color: "#e5edf8" },
        legend: {
          orientation: "h",
          y: 1.02,
          x: 0
        },
        uirevision: "mollier3d",
        scene: {
          bgcolor: "rgba(0,0,0,0)",
          aspectmode: "manual",
          aspectratio: {
            x: 1.45,
            y: 1.7,
            z: 1.7
          },
          uirevision: "mollier3d",
          camera: {
            eye: { x: 1.3, y: 1.45, z: 0.92 }
          },
          annotations: surfaceLabels,
          xaxis: {
            title: "Temperatura sucha [°C]",
            gridcolor: "#243146",
            zerolinecolor: "#243146",
            backgroundcolor: "rgba(0,0,0,0)",
            range: [tempMax, tempMin]
          },
          yaxis: {
            title: "Czas",
            gridcolor: "#243146",
            zerolinecolor: "#243146",
            backgroundcolor: "rgba(0,0,0,0)",
            type: "date"
          },
          zaxis: {
            title: "Entalpia [kJ/kg suchego powietrza]",
            gridcolor: "#243146",
            zerolinecolor: "#243146",
            backgroundcolor: "rgba(0,0,0,0)",
            range: [enthalpyMin, enthalpyMax]
          }
        },
        showlegend: true
      };

      Plotly.react("mollier3dChart", traces, layout, getCommonPlotConfig());

      requestAnimationFrame(() => {
        Plotly.Plots.resize("mollier3dChart");
      });
    }

    // =============================================================================
    // GŁÓWNA AKTUALIZACJA
    // =============================================================================
    async function renderPage(hours = historyHours) {
      statusEl.textContent = "Pobieranie...";

      try {
        if (cachedHistory.length) {
          renderFromCache();
          statusEl.textContent = `OK | punktów: ${cachedHistory.length}`;
          return;
        }

        const history = await fetchLublinHistory(hours);
        const current = await fetchLublinCurrent();

        if (!history.length) {
          throw new Error("Brak danych historycznych.");
        }

        const currentHumidityRatio = calculateHumidityRatio(current.temp, current.rh, current.pressure);
        const currentEnthalpy = calculateEnthalpy(current.temp, currentHumidityRatio);
        const currentDewPoint = calculateDewPoint(current.temp, current.rh);
        const currentAH = calculateAbsoluteHumidity(current.temp, current.rh);

        const currentPoint = (
          Number.isFinite(current.temp) &&
          Number.isFinite(currentEnthalpy) &&
          current.time instanceof Date
        )
          ? {
              time: current.time,
              enthalpy: currentEnthalpy,
              temp: current.temp
            }
          : null;

        cachedHistory = history;
        cachedCurrentPoint = currentPoint;
        cachedRange = null;
        renderMollier3D(history, currentPoint);

        infoEl.textContent =
          `Zakres historii: ostatnie ${hours} h | ` +
          `T: ${Number(current.temp).toFixed(2)} °C | ` +
          `RH: ${Number(current.rh).toFixed(1)} % | ` +
          `Ciśnienie: ${Number(current.pressure).toFixed(1)} hPa | ` +
          `Punkt rosy: ${currentDewPoint != null ? currentDewPoint.toFixed(2) + " °C" : "—"} | ` +
          `Wilgotność bezwzględna: ${currentAH != null ? currentAH.toFixed(2) + " g/m³" : "—"} | ` +
          `Aktualizacja: ${current.time ? formatDateTime(current.time) : "—"}`;

        statusEl.textContent = `OK | punktów: ${history.length}`;
      } catch (error) {
        console.error(error);
        statusEl.textContent = "Błąd pobierania danych";
        infoEl.textContent = "Nie udało się pobrać danych pogodowych ani narysować wykresu.";
      }
    }

    historyHoursRangeEl.addEventListener("input", () => {
      historyHours = Number(historyHoursRangeEl.value);
      updateHistoryHoursLabel(historyHours);
      if (cachedHistory.length && !selectedRangeDirty) {
        renderFromCache();
      } else {
        infoEl.textContent = "Wybierz zakres dat i kliknij Pobierz, aby załadować dane.";
      }
    });

    const handleDateRangeInput = () => {
      updateSliderRangeForSelectedDates();
      if (selectedRangeDirty) {
        infoEl.textContent = "Nowy zakres dat wymaga pobrania. Kliknij Pobierz.";
      }
    };

    startDateInputEl.addEventListener("input", handleDateRangeInput);
    endDateInputEl.addEventListener("input", handleDateRangeInput);

    fetchRangeButtonEl.addEventListener("click", async () => {
      statusEl.textContent = "Pobieranie...";
      try {
        await loadAndRenderSelectedRange();
      } catch (error) {
        console.error(error);
        statusEl.textContent = "Błąd pobierania danych";
        infoEl.textContent = error.message || "Nie udało się pobrać zakresu danych.";
      }
    });

    // =============================================================================
    // START
    // =============================================================================
    updateHistoryHoursLabel(historyHours);
    updateDateRangeInputs();
    updateSliderRangeForSelectedDates();
    renderPage();
  </script>
</body>
</html>
